name: SlopStopper · Reliability Smoke Tests

# Runs Playwright smoke tests against the deployed site (or local
# `slopstopper serve` for PR builds). Page list comes from
# pages.smoke in .slopstopper.yml. Triggers: PR, push to main, hourly
# schedule, Cloudflare deployment events. Failure raises a
# main-branch tracking issue with the run URL; recovery auto-closes
# it. No PR comment — exit code is the signal.
# Docs: docs/reliability/README.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  deployment_status:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test (leave blank to test local build)'
        required: false
        default: ''
        type: string

jobs:
  smoke-test:
    if: |
      github.event_name != 'deployment_status' ||
      github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.SLOPSTOPPER_NODE_VERSION || '20' }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install slopstopper-cli
        run: |
          # Editable install when run inside slopstopper.dev itself
          # (cli/ source present); PyPI install for adopter repos.
          if [ -f cli/pyproject.toml ]; then
            pip install -e ./cli
          else
            pip install slopstopper-cli
          fi

      - name: Install Task runner
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine test URL
        id: url
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_URL: ${{ github.event.inputs.url }}
          DEPLOYMENT_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          validate_url() {
            local url="$1"
            if [[ ! "$url" =~ ^https?://[^[:space:][:cntrl:]]+$ ]]; then
              echo "Error: Invalid URL format: $url" >&2
              exit 1
            fi
            printf '%s' "$url"
          }

          if [ "$EVENT_NAME" == "workflow_dispatch" ] && [ -n "$INPUT_URL" ]; then
            SAFE_URL="$(validate_url "$INPUT_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" == "deployment_status" ]; then
            SAFE_URL="$(validate_url "$DEPLOYMENT_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" == "schedule" ]; then
            CONFIG_URL="$(slopstopper config get urls.production)"
            if [ -z "$CONFIG_URL" ]; then
              echo "::error::Scheduled run requires urls.production in .slopstopper.yml" >&2
              exit 1
            fi
            SAFE_URL="$(validate_url "$CONFIG_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          else
            echo "url=http://localhost:8080" >> "$GITHUB_OUTPUT"
            echo "use_local=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Start local server (PR / push builds)
        if: steps.url.outputs.use_local == 'true'
        # CUSTOMISE FOR YOUR APP: by default this runs `npm run build`
        # then `slopstopper serve` (the bundled static server). Point
        # SMOKE_TEST_URL at a deployed environment to skip the local
        # serve. To use your own server, eject the bundled one with
        # `slopstopper templates eject server.js` and edit `.ss/server.js`.
        run: |
          if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            npm run build
          fi
          slopstopper serve &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 10); do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Server ready"
              break
            fi
            sleep 1
          done

      - name: Run smoke tests
        run: task ss:reliability:smoke -- ${{ steps.url.outputs.url }} --ci

      - name: Stop local server
        if: steps.url.outputs.use_local == 'true' && always()
        run: kill "$SERVER_PID" || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ github.run_id }}
          path: |
            playwright-report/
            .ss/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment on deployment commit (if applicable)
        if: github.event_name == 'deployment_status' && always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          URL: ${{ steps.url.outputs.url }}
          STATUS: ${{ job.status }}
        run: |
          status_marker=$([ "$STATUS" = "success" ] && echo "✅ PASSED" || echo "❌ FAILED")
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh api -X POST "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments" \
            -f body="## Smoke Test Results ${status_marker}

          Tested URL: ${URL}

          [View detailed results](${run_url})"

      - name: Emit issue on smoke failure
        if: failure() && github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit reliability:smoke --target issue

      - name: Close smoke failure issue on recovery
        if: success() && github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit reliability:smoke --target issue --on-pass=close
