name: SlopStopper · Code Complexity Check

# Detects high-complexity functions (CCN > 10) with Lizard.
# Triggers: PR, push to main. Emits a rolling PR comment (updated
# in-place per push) and a main-branch tracking issue on findings.
# Docs: docs/hygiene/README.md.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  complexity-check:
    name: Check Code Complexity with Lizard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Lizard
        run: |
          pip install --upgrade pip
          pip install lizard

      - name: Set up slopstopper toolchain
        # Installs the pinned slopstopper-cli + task from mise.toml and puts
        # them on PATH for later steps. The pin lives in mise.toml ([tools]
        # "pipx:slopstopper-cli"); mise resolves it per-repo, so CI and local
        # runs share one version.
        uses: jdx/mise-action@v2

      - name: Install slopstopper-cli from source (slopstopper.dev only)
        # In this repo the CLI runs from source (HEAD), so mise.toml carries
        # no slopstopper-cli pin — install it editable here. Adopter repos
        # skip this (no cli/ source) and use the mise-pinned wheel.
        if: ${{ hashFiles('cli/pyproject.toml') != '' }}
        run: pip install -e ./cli

      - name: Run complexity analysis
        id: complexity
        run: task ss:hygiene:complexity

      - name: Detect high-complexity items
        id: gate
        run: |
          # CSV columns: nloc,ccn,token,param,length,location
          if [ -f .ss/reports/complexity/complexity-report.csv ]; then
            HIGH_COUNT=$(awk -F',' '$2 > 10' .ss/reports/complexity/complexity-report.csv | wc -l | tr -d ' ')
          else
            HIGH_COUNT=0
          fi
          echo "high_complexity_found=$([ "$HIGH_COUNT" -gt 0 ] && echo 1 || echo 0)" >> "$GITHUB_OUTPUT"
          echo "high_count=$HIGH_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "⚠️  Found $HIGH_COUNT item(s) with CCN > 10"
          fi

      - name: Upload complexity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complexity-reports
          path: |
            .ss/reports/complexity/complexity-report.md
            .ss/reports/complexity/complexity-report.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Emit PR comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:complexity --target pr-comment

      - name: Emit issue on main (if high complexity)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.gate.outputs.high_complexity_found == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:complexity --target issue

      - name: Close issue on main when clean
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.gate.outputs.high_complexity_found != '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:complexity --target issue --on-pass=close

      - name: Fail job if high complexity found
        if: steps.gate.outputs.high_complexity_found == '1'
        run: |
          echo "::error::Code complexity issues detected (CCN > 10). Review the report and refactor."
          exit 1
