name: SlopStopper · Release Please

# Watches `main` for conventional-commit pushes and maintains a perpetual
# "Release PR" that:
#   * regenerates the CHANGELOG.md section for the next version,
#   * bumps `cli/pyproject.toml` `version` and
#     `cli/slopstopper/__init__.py` `__version__` in lockstep,
#   * waits to be merged.
#
# Merging the Release PR pushes the bump commit and creates the matching
# `vX.Y.Z` tag + GitHub Release with notes generated from the commits
# since the previous tag. The tag push triggers `ss-release.yml`, which
# builds + attests + publishes to PyPI and uploads artifacts to the
# already-created GitHub Release (its create-or-upload step is idempotent).
#
# So the full release flow becomes: write conventional-commit PRs,
# review the rolling Release PR, merge it when ready. No manual CHANGELOG
# edits, no manual version bumps, no manual tagging.
#
# Bumping policy (see release-please-config.json):
#   * `feat:`  → MINOR bump (pre-1.0 behaviour via `bump-minor-pre-major: true`)
#   * `fix:`   → PATCH bump
#   * `feat!:` or `BREAKING CHANGE:` footer → MINOR pre-1.0 (we explicitly
#     keep `bump-patch-for-minor-pre-major: false` so breaking changes don't
#     stay buried in a patch bump). Will switch to MAJOR once we cut 1.0.0.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived GitHub App installation token instead of using
      # GITHUB_TOKEN. Two reasons:
      #   * PRs opened by GITHUB_TOKEN have all their `pull_request`
      #     workflows silently skipped (anti-recursion). App-authored PRs
      #     are exempt, so PR CI runs automatically with no approval click.
      #   * Tags pushed by GITHUB_TOKEN don't fire other tag-triggered
      #     workflows (same anti-recursion rule). App-pushed tags do —
      #     so the v* tag this workflow creates auto-fires ss-release.yml.
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
