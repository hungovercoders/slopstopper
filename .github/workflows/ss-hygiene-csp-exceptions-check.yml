name: SlopStopper · Hygiene - CSP Exceptions Drift Check

# Validates that CSP exceptions declared in code (suppressions,
# allowlists) match docs/security/CSP_EXCEPTIONS.md. Triggers: PR,
# push to main. Workflow fails on drift; no separate main-branch
# issue (exit code is the signal).
# Docs: docs/security/CSP_EXCEPTIONS.md.

on:
  pull_request:
    paths:
      - 'worker/headers.json'
      - 'docs/security/CSP_EXCEPTIONS.md'
      - '.github/workflows/ss-hygiene-csp-exceptions-check.yml'
  push:
    branches: [main]
    paths:
      - 'worker/headers.json'
      - 'docs/security/CSP_EXCEPTIONS.md'
      - '.github/workflows/ss-hygiene-csp-exceptions-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-csp-exceptions:
    name: CSP Exceptions Drift Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up slopstopper toolchain
        # Installs the pinned slopstopper-cli + task from mise.toml and puts
        # them on PATH for later steps. The pin lives in mise.toml ([tools]
        # "pipx:slopstopper-cli"); mise resolves it per-repo, so CI and local
        # runs share one version.
        uses: jdx/mise-action@v2

      - name: Install slopstopper-cli from source (slopstopper.dev only)
        # In this repo the CLI runs from source (HEAD), so mise.toml carries
        # no slopstopper-cli pin — install it editable here. Adopter repos
        # skip this (no cli/ source) and use the mise-pinned wheel.
        if: ${{ hashFiles('cli/pyproject.toml') != '' }}
        run: pip install -e ./cli

      - name: Run CSP exceptions check
        id: check
        run: task ss:hygiene:csp-exceptions

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csp-exceptions-report-${{ github.run_id }}
          path: .ss/reports/csp/
          retention-days: 30
          if-no-files-found: ignore

      - name: Emit PR comment
        if: github.event_name == 'pull_request' && always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:csp-exceptions --target pr-comment
