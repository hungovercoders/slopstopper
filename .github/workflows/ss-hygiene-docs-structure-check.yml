name: SlopStopper · Hygiene - Documentation Structure Check

# Validates documentation directory structure (Map Pattern) and the
# docs/index.md catalogue against the actual tree. Triggers: PR, push
# to main. Emits a rolling PR comment and a main-branch tracking
# issue on violations.
# Docs: docs/hygiene/README.md.

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'docs/index.md'
      - '.github/workflows/ss-hygiene-docs-structure-check.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'docs/index.md'
      - '.github/workflows/ss-hygiene-docs-structure-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check-docs-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install slopstopper-cli
        run: |
          # Editable install when run inside slopstopper.dev itself (cli/
          # source present); pinned PyPI install for adopter repos. The
          # cli_version in .slopstopper.yml is the per-repo pin, parsed with
          # the same sed program install.sh uses so install and CI agree.
          if [ -f cli/pyproject.toml ]; then
            pip install -e ./cli
          else
            v="$(sed -n 's/^cli_version:[[:space:]]*["'\'']\{0,1\}\([0-9][0-9.]*\).*/\1/p' .slopstopper.yml 2>/dev/null | head -1)"
            if [ -n "$v" ]; then
              pip install "slopstopper-cli==$v"
            else
              pip install slopstopper-cli
            fi
          fi

      - name: Install Task runner
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run documentation structure check
        id: check
        continue-on-error: true
        run: task ss:hygiene:docs-structure

      - name: Emit PR comment
        if: github.event_name == 'pull_request' && steps.check.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:docs-structure --target pr-comment

      - name: Emit issue on main (if violations)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:docs-structure --target issue

      - name: Close issue on main when clean
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:docs-structure --target issue --on-pass=close

      - name: Upload structure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-structure-report
          path: .ss/reports/docs/docs-structure-report.md
          retention-days: 30

      - name: Fail the job if violations
        if: steps.check.outcome == 'failure'
        run: |
          echo "::error::Documentation structure violations detected. See report."
          exit 1
