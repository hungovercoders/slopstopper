name: SlopStopper · CLI Tests (pytest)

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'cli/**'
      - '.github/workflows/ss-hygiene-cli-tests-check.yml'
  push:
    branches: [ main ]
    paths:
      - 'cli/**'
      - '.github/workflows/ss-hygiene-cli-tests-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-tests:
    name: Run slopstopper-cli pytest suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install slopstopper-cli with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./cli[test]

      - name: Run pytest
        run: pytest cli/tests/
