name: SlopStopper · Secrets Detection

# Detects committed secrets with Gitleaks (pinned version). Triggers:
# PR, push to main. Emits a rolling PR comment (keyed on the "Secrets
# Detection" substring so each PR shows one rolling comment, not
# duplicates) and a main-branch tracking issue on findings.
# Docs: docs/security/README.md.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  secrets:
    name: Detect Secrets with Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Gitleaks
        # Pinned to a specific release rather than dynamically resolving
        # the latest tag. The previous approach piped an unauthenticated
        # `curl https://api.github.com/...` to extract the tag —
        # anonymous API requests from Actions runners are heavily
        # rate-limited and frequently return empty, producing a
        # `gitleaks__linux_x64.tar.gz` URL that 404s. Bump
        # GITLEAKS_VERSION manually when a refresh is wanted;
        # Dependabot's github-actions ecosystem can also be pointed at
        # this file.
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -e
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
        shell: bash

      - name: Install slopstopper-cli
        run: |
          # Editable install when run inside slopstopper.dev itself (cli/
          # source present); pinned PyPI install for adopter repos. The
          # cli_version in .slopstopper.yml is the per-repo pin, parsed with
          # the same sed program install.sh uses so install and CI agree.
          if [ -f cli/pyproject.toml ]; then
            pip install -e ./cli
          else
            v="$(sed -n 's/^cli_version:[[:space:]]*["'\'']\{0,1\}\([0-9][0-9.]*\).*/\1/p' .slopstopper.yml 2>/dev/null | head -1)"
            if [ -n "$v" ]; then
              pip install "slopstopper-cli==$v"
            else
              pip install slopstopper-cli
            fi
          fi

      - name: Install Task runner
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run secrets detection
        id: secrets
        run: task ss:security:secrets

      - name: Detect secrets in report
        id: gate
        run: |
          # The CLI check always exits 0; the workflow gates on the JSON
          # report. JSON is a list of findings or 'null' / empty.
          if [ -f .ss/reports/secrets/secrets-report.json ]; then
            COUNT=$(python3 -c "
          import json
          with open('.ss/reports/secrets/secrets-report.json') as f:
              c = f.read().strip()
          if not c or c == 'null':
              print(0)
          else:
              d = json.loads(c)
              print(len(d) if isinstance(d, list) else 0)
          ")
          else
            COUNT=0
          fi
          echo "secrets_found=$([ "$COUNT" -gt 0 ] && echo 1 || echo 0)" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "⚠️  Found $COUNT secret(s)"
          fi

      - name: Upload secrets reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-reports
          path: |
            .ss/reports/secrets/secrets-report.md
            .ss/reports/secrets/secrets-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Emit PR comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit security:secrets --target pr-comment

      - name: Emit issue on main (if secrets detected)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.gate.outputs.secrets_found == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit security:secrets --target issue

      - name: Close issue on main when clean
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.gate.outputs.secrets_found != '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit security:secrets --target issue --on-pass=close

      - name: Fail job if secrets detected
        if: steps.gate.outputs.secrets_found == '1'
        run: |
          echo "::error::Secrets detected. Revoke exposed credentials and remove them from the repo."
          exit 1
