name: CI · slopstopper-cli

# Internal CI for the slopstopper-cli Python package under cli/.
# Not part of the distributed slopstopper suite — this workflow is
# slopstopper.dev-internal and is NOT seeded into adopter repos by
# install.sh. Adopters never receive cli/, so they never need to run
# its tests.
#
# Two jobs:
#   test    — pytest suite under cli/tests/
#   parity  — runs each ported check via BOTH the legacy bash/python
#             implementation under .ss/scripts/ and the CLI port, then
#             diffs their reports. Any divergence fails CI. This is the
#             load-bearing proof we can trust the CLI to replace each
#             bash script.
#
# Both jobs delegate to cli/Taskfile.yml so the exact same command
# developers run locally is what CI runs. As the CLI grows beyond
# pytest (lint, type-check, build, packaging smoke test), add task
# targets in cli/Taskfile.yml and steps here rather than spinning up
# new ss-*-check.yml workflows.
#
# `paths:` covers cli/** AND every .ss/scripts/<script> the parity job
# currently exercises. When a check is fully cut over (workflow
# flipped, bash deleted), drop its bash path from this list.

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'cli/**'
      - '.github/workflows/ci-cli.yml'
      - '.ss/scripts/check-docs-size.sh'
      - '.ss/scripts/generate-docs-size-report.py'
      - '.ss/scripts/check-entry-file-size.py'
      - '.ss/scripts/check-docs-structure.py'
      - '.ss/scripts/generate-docs-structure-md.py'
      - '.ss/scripts/check-docs-accuracy.py'
      - '.ss/scripts/generate-docs-accuracy-md.py'
      - '.ss/scripts/generate-complexity-md.py'
      - '.ss/scripts/check-csp-exceptions.py'
      - '.ss/scripts/headers_adapters/**'
      - '.ss/scripts/generate-secrets-md.py'
      - '.ss/scripts/generate-sast-md.py'
      - '.ss/scripts/generate-dependencies-md.py'
      - '.ss/scripts/generate-dast-md.py'
      - '.ss/playwright.config.js'
      - '.ss/lighthouserc.json'
      - '.ss/tests/smoke.spec.ts'
      - '.ss/tests/accessibility.spec.ts'
      - '.ss/tests/broken-links.spec.ts'
      # Flipped ss-*-check.yml workflows — changes here depend on the
      # CLI's `slopstopper run` and `slopstopper emit` working, so the
      # CLI tests must run too. As more workflows flip, add them here.
      - '.github/workflows/ss-hygiene-docs-size-check.yml'
      - '.github/workflows/ss-hygiene-entry-files-check.yml'
      - '.github/workflows/ss-hygiene-docs-structure-check.yml'
      - '.github/workflows/ss-hygiene-complexity-check.yml'
      - '.github/workflows/ss-hygiene-docs-accuracy-check.yml'
      - '.github/workflows/ss-hygiene-csp-exceptions-check.yml'
      - '.github/workflows/ss-security-secrets-check.yml'
  push:
    branches: [ main ]
    paths:
      - 'cli/**'
      - '.github/workflows/ci-cli.yml'
      - '.ss/scripts/check-docs-size.sh'
      - '.ss/scripts/generate-docs-size-report.py'
      - '.ss/scripts/check-entry-file-size.py'
      - '.ss/scripts/check-docs-structure.py'
      - '.ss/scripts/generate-docs-structure-md.py'
      - '.ss/scripts/check-docs-accuracy.py'
      - '.ss/scripts/generate-docs-accuracy-md.py'
      - '.ss/scripts/generate-complexity-md.py'
      - '.ss/scripts/check-csp-exceptions.py'
      - '.ss/scripts/headers_adapters/**'
      - '.ss/scripts/generate-secrets-md.py'
      - '.ss/scripts/generate-sast-md.py'
      - '.ss/scripts/generate-dependencies-md.py'
      - '.ss/scripts/generate-dast-md.py'
      - '.ss/playwright.config.js'
      - '.ss/lighthouserc.json'
      - '.ss/tests/smoke.spec.ts'
      - '.ss/tests/accessibility.spec.ts'
      - '.ss/tests/broken-links.spec.ts'
      # Flipped ss-*-check.yml workflows — changes here depend on the
      # CLI's `slopstopper run` and `slopstopper emit` working, so the
      # CLI tests must run too. As more workflows flip, add them here.
      - '.github/workflows/ss-hygiene-docs-size-check.yml'
      - '.github/workflows/ss-hygiene-entry-files-check.yml'
      - '.github/workflows/ss-hygiene-docs-structure-check.yml'
      - '.github/workflows/ss-hygiene-complexity-check.yml'
      - '.github/workflows/ss-hygiene-docs-accuracy-check.yml'
      - '.github/workflows/ss-hygiene-csp-exceptions-check.yml'
      - '.github/workflows/ss-security-secrets-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Task
        run: curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin
      - name: Run CLI tests
        run: task -t cli/Taskfile.yml test

  templates-sync:
    name: templates sync (.ss/ ↔ cli/slopstopper/data/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Task
        run: curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin
      - name: Verify .ss/ template copies match source-of-truth
        run: task -t cli/Taskfile.yml templates-sync-check

  parity:
    name: bash↔cli parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Task
        run: curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin
      - name: Run parity diffs (bash vs CLI)
        run: task -t cli/Taskfile.yml parity
