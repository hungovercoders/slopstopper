name: CI · slopstopper-cli

# Internal CI for the slopstopper-cli Python package under cli/.
# Not part of the distributed slopstopper suite — this workflow is
# slopstopper.dev-internal and is NOT seeded into adopter repos by
# install.sh. Adopters never receive cli/, so they never need to run
# its tests.
#
# This workflow delegates to cli/Taskfile.yml so the exact same
# command developers run locally (`task -t cli/Taskfile.yml test`) is
# what CI runs. As the CLI grows beyond pytest (lint, type-check, build,
# packaging smoke test), add task targets in cli/Taskfile.yml and
# steps here rather than spinning up new ss-*-check.yml workflows.

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'cli/**'
      - '.github/workflows/ci-cli.yml'
  push:
    branches: [ main ]
    paths:
      - 'cli/**'
      - '.github/workflows/ci-cli.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Task
        run: curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin
      - name: Run CLI tests
        run: task -t cli/Taskfile.yml test
