name: Git Commit Drift Detection

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  drift-detection:
    name: Detect Git Commit Drift
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Inject git commit SHA
        run: sed -i 's/__GIT_COMMIT__/${{ github.sha }}/g' app/index.html

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start local server
        run: |
          node server.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 10); do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Server ready"
              break
            fi
            sleep 1
          done

      - name: Run drift detection tests
        run: npx playwright test --config=.ss/playwright.config.js .ss/tests/drift-detection.spec.js
        env:
          GITHUB_SHA: ${{ github.sha }}
          BASE_URL: http://localhost:8080

      - name: Stop local server
        if: always()
        run: kill "$SERVER_PID" || true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: drift-detection-report
          path: |
            playwright-report/
            .ss/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

