name: SlopStopper · Broken Links Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  deployment_status:
  # Run daily at 08:00 UTC
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to check (leave blank to check local build)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  broken-links:
    name: Broken Links Check
    if: |
      github.event_name != 'deployment_status' ||
      github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.SLOPSTOPPER_NODE_VERSION || '20' }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Task
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin
          task --version

      - name: Determine check URL
        id: url
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_URL: ${{ github.event.inputs.url }}
          DEPLOYMENT_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          validate_url() {
            local url="$1"
            if [[ ! "$url" =~ ^https?://[^[:space:][:cntrl:]]+$ ]]; then
              echo "Error: Invalid URL format: $url" >&2
              exit 1
            fi
            printf '%s' "$url"
          }

          if [ "$EVENT_NAME" == "workflow_dispatch" ] && [ -n "$INPUT_URL" ]; then
            SAFE_URL="$(validate_url "$INPUT_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" == "deployment_status" ]; then
            SAFE_URL="$(validate_url "$DEPLOYMENT_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" == "schedule" ]; then
            echo "url=https://slopstopper.dev" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          else
            echo "url=http://localhost:8080" >> "$GITHUB_OUTPUT"
            echo "use_local=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Start local server
        if: steps.url.outputs.use_local == 'true'
        run: |
          npm run build
          node server.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 10); do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Server ready"
              break
            fi
            sleep 1
          done

      - name: Pages to audit
        if: steps.url.outputs.use_local == 'true'
        # Reads pages.broken_links from .slopstopper.yml. Falls back to '/'
        # if not configured. Override per-repo in .slopstopper.yml:
        #   pages:
        #     broken_links: /,/blog,/about
        run: |
          PAGES=$(python3 .ss/scripts/load_config.py pages.broken_links /)
          echo "BROKEN_LINKS_PAGES=$PAGES" >> "$GITHUB_ENV"

      - name: Run broken-link checks
        env:
          BROKEN_LINKS_TEST_URL: ${{ steps.url.outputs.url }}
          BROKEN_LINKS_PAGES: ${{ env.BROKEN_LINKS_PAGES }}
        run: task ss:reliability:links:ci

      - name: Stop local server
        if: always() && steps.url.outputs.use_local == 'true'
        run: kill "$SERVER_PID" || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broken-link-report-${{ github.run_id }}
          path: |
            playwright-report/
            .ss/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHECK_URL: ${{ steps.url.outputs.url }}
        with:
          script: |
            const status = process.env.JOB_STATUS === 'success' ? '✅ PASSED' : '❌ FAILED';
            const runUrl = process.env.RUN_URL;
            const checkUrl = process.env.CHECK_URL;

            const body = [
              `## 🔗 Broken Links Check ${status}`,
              '',
              `**Checked URL:** ${checkUrl}`,
              '',
              '### 🔍 How to Check Locally',
              '',
              '```bash',
              'BROKEN_LINKS_TEST_URL=https://your-site.example.com task ss:reliability:links',
              '',
              'task ss:reliability:links -- https://your-site.example.com',
              '```',
              '',
              `[Full report in workflow artifacts](${runUrl})`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
