name: SlopStopper · Broken Links Check

# Crawls the deployed site for broken internal links via Playwright.
# Page list resolved by `slopstopper discover` (reads
# pages.broken_links from .slopstopper.yml, falls back to sitemap or
# changed-files heuristics) and surfaced via the BROKEN_LINKS_PAGES
# env var. Triggers: PR, push to main, daily schedule, Cloudflare
# deployment events. Emits a rolling PR comment and a main-branch
# tracking issue; auto-closes on a clean run.
# Docs: docs/reliability/README.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  deployment_status:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to check (leave blank to check local build)'
        required: false
        default: ''
        type: string
      coverage_mode:
        description: 'Force discovery mode (overrides .slopstopper.yml)'
        required: false
        default: ''
        type: choice
        options: ['', 'sitemap', 'changed']

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  broken-links:
    name: Broken Links Check
    if: |
      github.event_name != 'deployment_status' ||
      github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # `slopstopper discover --event=pr` runs in changed-mode and
          # needs git history vs the base branch.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.SLOPSTOPPER_NODE_VERSION || '20' }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install slopstopper-cli
        run: |
          # Editable install when run inside slopstopper.dev itself (cli/
          # source present); pinned PyPI install for adopter repos. The
          # cli_version in .slopstopper.yml is the per-repo pin, parsed with
          # the same sed program install.sh uses so install and CI agree.
          if [ -f cli/pyproject.toml ]; then
            pip install -e ./cli
          else
            v="$(sed -n 's/^cli_version:[[:space:]]*["'\'']\{0,1\}\([0-9][0-9.]*\).*/\1/p' .slopstopper.yml 2>/dev/null | head -1)"
            if [ -n "$v" ]; then
              pip install "slopstopper-cli==$v"
            else
              pip install slopstopper-cli
            fi
          fi

      - name: Install Task runner
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine check URL
        id: url
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_URL: ${{ github.event.inputs.url }}
          DEPLOYMENT_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          validate_url() {
            local url="$1"
            if [[ ! "$url" =~ ^https?://[^[:space:][:cntrl:]]+$ ]]; then
              echo "Error: Invalid URL format: $url" >&2
              exit 1
            fi
            printf '%s' "$url"
          }

          if [ "$EVENT_NAME" == "workflow_dispatch" ] && [ -n "$INPUT_URL" ]; then
            SAFE_URL="$(validate_url "$INPUT_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" == "deployment_status" ]; then
            SAFE_URL="$(validate_url "$DEPLOYMENT_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" == "schedule" ]; then
            CONFIG_URL="$(slopstopper config get urls.production)"
            if [ -z "$CONFIG_URL" ]; then
              echo "::error::Scheduled run requires urls.production in .slopstopper.yml" >&2
              exit 1
            fi
            SAFE_URL="$(validate_url "$CONFIG_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          else
            echo "url=http://localhost:8080" >> "$GITHUB_OUTPUT"
            echo "use_local=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Start local server
        if: steps.url.outputs.use_local == 'true'
        run: |
          npm run build
          slopstopper serve &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 10); do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Server ready"
              break
            fi
            sleep 1
          done

      - name: Pages to audit
        if: steps.url.outputs.use_local == 'true'
        env:
          DISPATCH_MODE: ${{ github.event.inputs.coverage_mode }}
          GITHUB_BASE_REF: ${{ github.base_ref || 'main' }}
        # Maps GH event → slopstopper discover's --event flag. Falls
        # through to pages.broken_links when reliability.coverage.* is
        # unset, so existing adopters see no behaviour change.
        run: |
          case "${{ github.event_name }}" in
            pull_request|pull_request_target) EVENT=pr ;;
            push)              EVENT=main ;;
            schedule)          EVENT=cron ;;
            deployment_status) EVENT=main ;;
            workflow_dispatch) EVENT="${DISPATCH_MODE:-main}" ;;
            *)                 EVENT=main ;;
          esac
          PAGES=$(slopstopper discover broken_links --event="$EVENT")
          echo "BROKEN_LINKS_PAGES=$PAGES" >> "$GITHUB_ENV"

      - name: Run broken-link checks
        env:
          BROKEN_LINKS_PAGES: ${{ env.BROKEN_LINKS_PAGES }}
        run: task ss:reliability:broken-links -- ${{ steps.url.outputs.url }} --ci

      - name: Stop local server
        if: always() && steps.url.outputs.use_local == 'true'
        run: kill "$SERVER_PID" || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broken-link-report-${{ github.run_id }}
          path: |
            playwright-report/
            .ss/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit reliability:broken-links --target pr-comment

      - name: Emit issue on broken-links failure (main)
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit reliability:broken-links --target issue

      - name: Close broken-links issue on recovery (main)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit reliability:broken-links --target issue --on-pass=close
