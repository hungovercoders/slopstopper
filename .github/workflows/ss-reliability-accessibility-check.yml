name: SlopStopper · Accessibility Check

# Audits accessibility against WCAG 2.1 AA using axe-core via
# Playwright. Triggers: PR, push to main, daily schedule, Cloudflare
# deployment events. Emits a rolling PR comment (find-or-update by
# H2 marker) and a main-branch tracking issue on violations;
# auto-closes the issue on a clean run.
# Docs: docs/reliability/ACCESSIBILITY.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  deployment_status:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit (leave blank to audit local build)'
        required: false
        default: ''
        type: string
      impact:
        description: 'Minimum violation impact to fail on (critical|serious|moderate|minor)'
        required: false
        default: 'serious'
        type: string
      threshold:
        description: 'Maximum allowed violations before failing (default: 0)'
        required: false
        default: '0'
        type: string
      coverage_mode:
        description: 'Force discovery mode (overrides .slopstopper.yml)'
        required: false
        default: ''
        type: choice
        options: ['', 'sitemap', 'changed']

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  accessibility:
    name: Accessibility Audit (axe-core / WCAG 2.1 AA)
    if: |
      github.event_name != 'deployment_status' ||
      github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.SLOPSTOPPER_NODE_VERSION || '20' }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install slopstopper-cli
        run: |
          # Editable install when run inside slopstopper.dev itself
          # (cli/ source present); PyPI install for adopter repos.
          if [ -f cli/pyproject.toml ]; then
            pip install -e ./cli
          else
            pip install slopstopper-cli
          fi

      - name: Determine audit URL
        id: url
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_URL: ${{ github.event.inputs.url }}
          DEPLOYMENT_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          validate_url() {
            local url="$1"
            if [[ ! "$url" =~ ^https?://[^[:space:][:cntrl:]]+$ ]]; then
              echo "Error: Invalid URL format: $url" >&2
              exit 1
            fi
            printf '%s' "$url"
          }

          if [ "$EVENT_NAME" == "workflow_dispatch" ] && [ -n "$INPUT_URL" ]; then
            SAFE_URL="$(validate_url "$INPUT_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" == "deployment_status" ]; then
            SAFE_URL="$(validate_url "$DEPLOYMENT_URL")"
            echo "url=$SAFE_URL" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" == "schedule" ]; then
            echo "url=https://slopstopper.dev" >> "$GITHUB_OUTPUT"
            echo "use_local=false" >> "$GITHUB_OUTPUT"
          else
            echo "url=http://localhost:8080" >> "$GITHUB_OUTPUT"
            echo "use_local=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Start local server (PR / push builds)
        if: steps.url.outputs.use_local == 'true'
        # CUSTOMISE FOR YOUR APP: by default this runs `npm run build`
        # then `slopstopper serve` (the bundled static server). Point
        # ACCESSIBILITY_TEST_URL at a deployed environment to skip the
        # local serve, or eject the bundled server with
        # `slopstopper templates eject server.js` and customise `.ss/server.js`.
        run: |
          if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            npm run build
          fi
          slopstopper serve &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 10); do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Server ready"
              break
            fi
            sleep 1
          done

      - name: Pages to audit
        if: steps.url.outputs.use_local == 'true'
        env:
          DISPATCH_MODE: ${{ github.event.inputs.coverage_mode }}
          GITHUB_BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          case "${{ github.event_name }}" in
            pull_request|pull_request_target) EVENT=pr ;;
            push)              EVENT=main ;;
            schedule)          EVENT=cron ;;
            deployment_status) EVENT=main ;;
            workflow_dispatch) EVENT="${DISPATCH_MODE:-main}" ;;
            *)                 EVENT=main ;;
          esac
          PAGES=$(slopstopper discover accessibility --event="$EVENT")
          echo "ACCESSIBILITY_PAGES=$PAGES" >> "$GITHUB_ENV"

      - name: Run accessibility audit
        id: audit
        env:
          ACCESSIBILITY_TEST_URL: ${{ steps.url.outputs.url }}
          ACCESSIBILITY_IMPACT: ${{ github.event.inputs.impact || 'serious' }}
          ACCESSIBILITY_THRESHOLD: ${{ github.event.inputs.threshold || '0' }}
        run: slopstopper run reliability:accessibility -- --ci

      - name: Stop local server
        if: steps.url.outputs.use_local == 'true' && always()
        run: kill "$SERVER_PID" || true

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report-${{ github.run_id }}
          path: |
            playwright-report/
            .ss/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          INPUT_IMPACT: ${{ github.event.inputs.impact || 'serious' }}
          INPUT_THRESHOLD: ${{ github.event.inputs.threshold || '0' }}
        run: |
          status_marker=$([ "$JOB_STATUS" = "success" ] && echo "✅ PASSED" || echo "❌ FAILED")
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          failure_note=""
          if [ "$JOB_STATUS" != "success" ]; then
            failure_note=$'\n> ⚠️ Violations were detected. See workflow logs for details.\n'
          fi
          body=$(cat <<EOF
          ## ♿ Accessibility Audit ${status_marker}

          **Standard:** WCAG 2.1 AA  **Min impact:** \`${INPUT_IMPACT}\`  **Max violations allowed:** ${INPUT_THRESHOLD}
          ${failure_note}
          ### 🔍 How to Check Locally

          \`\`\`bash
          # Audit the local build
          slopstopper run reliability:accessibility

          # Or audit a deployed URL
          slopstopper run reliability:accessibility -- --url https://your-site.example.com
          \`\`\`

          [Full report in workflow artifacts](${run_url})
          EOF
          )
          marker='♿ Accessibility Audit'
          pr_number=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          existing=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
            --jq ".[] | select(.user.type==\"Bot\" and (.body | contains(\"$marker\"))) | .id" | head -n1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -f body="$body"
          else
            gh pr comment "$pr_number" --body "$body"
          fi

      - name: Open / update issue on accessibility failure (main)
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title='♿ Accessibility Violations Detected on Main Branch'
          label='accessibility'
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          sha_short="${GITHUB_SHA:0:7}"
          body=$(cat <<EOF
          ## Accessibility Audit Failure

          **Commit:** [\`${sha_short}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})
          **Run:** [#${GITHUB_RUN_ID}](${run_url})

          Accessibility violations above the configured impact threshold were found on the main branch.

          ## How to Reproduce Locally

          \`\`\`bash
          # Start the local server
          npm run build && slopstopper serve &

          # Run accessibility audit
          slopstopper run reliability:accessibility -- --url http://localhost:8080
          \`\`\`

          [View the failed workflow run](${run_url})

          ---
          *This issue was automatically created by the Accessibility Check workflow.*
          EOF
          )
          existing=$(gh issue list --state open --label "$label" --search "in:title $title" --json number,title --jq ".[] | select(.title==\"$title\") | .number" | head -n1)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "## New Failure

          **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Run:** [#${GITHUB_RUN_ID}](${run_url})"
          else
            gh issue create --title "$title" --body "$body" --label "$label" --label reliability
          fi

      - name: Close accessibility issue on success (main)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title='♿ Accessibility Violations Detected on Main Branch'
          label='accessibility'
          numbers=$(gh issue list --state open --label "$label" --search "in:title $title" --json number,title --jq ".[] | select(.title==\"$title\") | .number")
          for n in $numbers; do
            gh issue comment "$n" --body "✅ Accessibility audit is now passing. Closing this issue automatically."
            gh issue close "$n"
          done
