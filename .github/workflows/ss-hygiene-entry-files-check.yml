name: SlopStopper · Hygiene - Entry-File Budget Check

# Enforces word-count budgets on root-level entry files (README.md,
# AGENTS.md, CLAUDE.md). Triggers: PR, push to main. Emits a rolling
# PR comment; workflow fails on over-budget — no separate main-branch
# issue (exit code is the signal).
# Docs: docs/hygiene/README.md.

on:
  pull_request:
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/workflows/ss-hygiene-entry-files-check.yml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/workflows/ss-hygiene-entry-files-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-entry-files:
    name: Entry-File Budget Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up slopstopper toolchain
        # Installs the pinned slopstopper-cli + task from mise.toml and puts
        # them on PATH for later steps. The pin lives in mise.toml ([tools]
        # "pipx:slopstopper-cli"); mise resolves it per-repo, so CI and local
        # runs share one version.
        uses: jdx/mise-action@v2

      - name: Install slopstopper-cli from source (slopstopper.dev only)
        # In this repo the CLI runs from source (HEAD), so mise.toml carries
        # no slopstopper-cli pin — install it editable here. Adopter repos
        # skip this (no cli/ source) and use the mise-pinned wheel.
        if: ${{ hashFiles('cli/pyproject.toml') != '' }}
        run: pip install -e ./cli

      - name: Run entry-file budget check
        id: check
        run: task ss:hygiene:entry-files

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entry-files-report-${{ github.run_id }}
          path: .ss/reports/entry-files/
          retention-days: 30
          if-no-files-found: ignore

      - name: Emit PR comment
        if: github.event_name == 'pull_request' && always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:entry-files --target pr-comment
