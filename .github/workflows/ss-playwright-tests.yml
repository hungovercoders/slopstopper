name: SlopStopper · Playwright Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build site
        # CUSTOMISE FOR YOUR APP: this builds and serves the static demo site.
        # Replace with your app's build/serve commands.
        run: npm run build

      - name: Start local server
        run: |
          if [ -f server.js ]; then
            node server.js &
            echo "SERVER_PID=$!" >> "$GITHUB_ENV"
            for i in $(seq 1 10); do
              if curl -s http://localhost:8080 > /dev/null; then
                echo "✅ Server ready"
                break
              fi
              sleep 1
            done
          else
            echo "ℹ️  No server.js — customise this step for your app's server."
            exit 1
          fi

      - name: Run Playwright tests
        env:
          SMOKE_TEST_URL: http://localhost:8080
          ACCESSIBILITY_TEST_URL: http://localhost:8080
          SMOKE_PAGES: '/,/features.html,/tools.html,/feedback.html'
          ACCESSIBILITY_PAGES: '/,/features.html,/tools.html,/feedback.html'
        run: npm test

      - name: Stop local server
        if: always()
        run: kill "$SERVER_PID" || true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            .ss/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
