name: SS - Hygiene - Documentation Front Matter Check

on:
  pull_request:
    paths:
      - 'docs/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check-docs-front-matter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Task
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin
          task --version

      - name: Run documentation front matter check
        id: front_matter
        run: |
          task ss:hygiene:docs-front-matter || true

          if [ -f .ss/reports/docs/docs-front-matter-report.json ]; then
            ISSUE_COUNT=$(python3 -c "
          import json
          with open('.ss/reports/docs/docs-front-matter-report.json') as f:
            data = json.load(f)
          print(data.get('issue_count', 0))
          " 2>/dev/null || echo "0")
            echo "issue_count=$ISSUE_COUNT" >> $GITHUB_OUTPUT

            if [ "$ISSUE_COUNT" -gt 0 ]; then
              echo "has_issues=true" >> $GITHUB_OUTPUT
            else
              echo "has_issues=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "issue_count=0" >> $GITHUB_OUTPUT
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy report for workflow
        run: cp .ss/reports/docs/docs-front-matter-report.md docs-front-matter-report.md || true

      - name: Comment on PR with front matter report
        if: github.event_name == 'pull_request' && steps.front_matter.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let reportContent = '';
            try {
              reportContent = fs.readFileSync('docs-front-matter-report.md', 'utf8');
            } catch (e) {
              reportContent = '❌ Failed to read front matter report';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '📄 Documentation Front Matter';
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: reportContent
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reportContent
              });
            }

      - name: Create or update issue on main when front matter fails
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.front_matter.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let reportContent = 'Unable to read front matter report';
            try {
              reportContent = fs.readFileSync('docs-front-matter-report.md', 'utf8');
            } catch (e) {
              console.log('Report not found:', e.message);
            }

            const label = 'documentation-front-matter';
            const title = '📄 Documentation Front Matter Issues';
            const body = `One or more documentation files are missing valid YAML front matter.

            ## Report
            ${reportContent}

            ## To Fix
            \`\`\`bash
            task ss:hygiene:docs-front-matter
            \`\`\`

            Add a front matter block at the top of each flagged file:

            \`\`\`yaml
            ---
            title: <Document Title>
            description: <One-line description of the document.>
            status: maintained
            date: YYYY-MM-DD
            ---
            \`\`\`

            ---
            *This issue was automatically created by the Documentation Front Matter Check workflow.*
            ${context.sha ? `Commit: ${context.sha}` : ''}`.replace(/^            /gm, '');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label
            });

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `🔔 Documentation front matter issues detected again in commit ${context.sha}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label, 'documentation']
              });
            }

      - name: Close issue when front matter is clean
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.front_matter.outputs.has_issues == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'documentation-front-matter';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label
            });

            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ Documentation front matter checks now pass. Closing automatically.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

      - name: Upload front matter report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-front-matter-report
          path: .ss/reports/docs/docs-front-matter-report.md
          retention-days: 30
