name: SlopStopper · Hygiene - Documentation Accuracy Check

# Scans the repo for documentation references that no longer match
# the code or links they describe. Triggers: PR, push to main, weekly
# schedule. Emits a rolling PR comment, opens/updates a main-branch
# tracking issue on findings, and auto-closes the issue when docs are
# clean.
# Docs: docs/hygiene/README.md.

on:
  # Weekly schedule (every Monday at 07:00 UTC)
  schedule:
    - cron: '0 7 * * 1'

  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CONTRIBUTING.md'
      - '*.html'
      - '*.js'
      - '*.css'
      - 'Taskfile.yml'
      - 'Taskfile.ss.yml'
      - 'wrangler.jsonc'
      - 'worker/**'
      - 'server.js'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CONTRIBUTING.md'
      - '*.html'
      - '*.js'
      - '*.css'
      - 'Taskfile.yml'
      - 'Taskfile.ss.yml'
      - 'wrangler.jsonc'
      - 'worker/**'
      - 'server.js'
      - '.github/workflows/**'

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check-docs-accuracy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up slopstopper toolchain
        # Installs the pinned slopstopper-cli + task from mise.toml and puts
        # them on PATH for later steps. The pin lives in mise.toml ([tools]
        # "pipx:slopstopper-cli"); mise resolves it per-repo, so CI and local
        # runs share one version.
        uses: jdx/mise-action@v2

      - name: Install slopstopper-cli from source (slopstopper.dev only)
        # In this repo the CLI runs from source (HEAD), so mise.toml carries
        # no slopstopper-cli pin — install it editable here. Adopter repos
        # skip this (no cli/ source) and use the mise-pinned wheel.
        if: ${{ hashFiles('cli/pyproject.toml') != '' }}
        run: pip install -e ./cli

      - name: Run documentation accuracy check
        id: check
        continue-on-error: true
        run: task ss:hygiene:docs-accuracy

      - name: Emit PR comment
        if: github.event_name == 'pull_request' && steps.check.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:docs-accuracy --target pr-comment

      - name: Emit issue (push / schedule / dispatch — when issues found)
        if: >-
          (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
          && steps.check.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:docs-accuracy --target issue

      - name: Auto-close issue when clean
        if: >-
          (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
          && steps.check.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: slopstopper emit hygiene:docs-accuracy --target issue --on-pass=close

      - name: Upload accuracy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-accuracy-report
          path: .ss/reports/docs/docs-accuracy-report.md
          retention-days: 30

      - name: Fail job if issues
        if: steps.check.outcome == 'failure'
        run: |
          echo "::error::Documentation accuracy issues detected. See report."
          exit 1
