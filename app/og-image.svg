<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SlopStopper — stop the slop. Deterministic feedback for AI-driven development.">
  <defs>
    <style>
      .sans { font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Cream background -->
  <rect width="1200" height="630" fill="#FBF5EC"/>

  <!-- Decorative peach blobs -->
  <circle cx="1130" cy="70" r="140" fill="#FFD9B8" opacity="0.55"/>
  <circle cx="60" cy="600" r="110" fill="#FFE9D4" opacity="0.7"/>
  <circle cx="980" cy="560" r="40" fill="#F5C24C" opacity="0.6"/>

  <!-- Sticker card shadow + card -->
  <g transform="translate(70, 100) rotate(-1.2)">
    <rect x="10" y="14" width="1060" height="450" rx="32" fill="#2A2118" opacity="0.92"/>
    <rect width="1060" height="450" rx="32" fill="#FFE9D4" stroke="#2A2118" stroke-width="6"/>
  </g>

  <!-- Stoppy mascot (left) — 1.6x scale of source -->
  <g transform="translate(120, 160) scale(1.6)">
    <ellipse cx="120" cy="225" rx="70" ry="6" fill="rgba(42,33,24,0.18)"/>
    <path d="M40 130 C40 75, 80 50, 120 50 C160 50, 200 75, 200 130 C200 180, 165 210, 120 210 C75 210, 40 180, 40 130 Z"
          fill="#FBF5EC" stroke="#2A2118" stroke-width="6" stroke-linejoin="round"/>
    <rect x="92" y="58" width="22" height="8" rx="2" fill="#F5C24C" stroke="#2A2118" stroke-width="2.5"/>
    <line x1="98" y1="58" x2="98" y2="66" stroke="#2A2118" stroke-width="2"/>
    <line x1="108" y1="58" x2="108" y2="66" stroke="#2A2118" stroke-width="2"/>
    <circle cx="92" cy="130" r="13" fill="#2A2118"/>
    <circle cx="148" cy="130" r="13" fill="#2A2118"/>
    <circle cx="96" cy="125" r="4" fill="#FBF5EC"/>
    <circle cx="152" cy="125" r="4" fill="#FBF5EC"/>
    <path d="M100 165 Q120 182, 140 165" stroke="#2A2118" stroke-width="5" stroke-linecap="round" fill="none"/>
    <rect x="116" y="158" width="6" height="10" rx="1" fill="#FBF5EC" stroke="#2A2118" stroke-width="2"/>
    <circle cx="180" cy="155" r="8" fill="#FBF5EC" stroke="#2A2118" stroke-width="4"/>
    <circle cx="60" cy="155" r="8" fill="#FBF5EC" stroke="#2A2118" stroke-width="4"/>
    <polygon points="178,90 218,90 232,118 218,146 178,146 164,118" fill="#E8512B" stroke="#2A2118" stroke-width="5" stroke-linejoin="round"/>
    <text x="198" y="124" text-anchor="middle" class="sans" font-weight="800" font-size="18" fill="#FBF5EC">SLOP</text>
  </g>

  <!-- Right column text -->
  <g class="sans">
    <text x="540" y="220" font-size="22" font-weight="800" fill="#B33A1A" letter-spacing="3">SLOPSTOPPER.DEV</text>

    <text x="540" y="320" font-size="92" font-weight="900" fill="#2A2118">Stop the</text>

    <!-- Sun highlighter behind "slop." -->
    <rect x="538" y="362" width="290" height="28" fill="#F5C24C"/>
    <text x="540" y="400" font-size="92" font-weight="900" fill="#2A2118">slop.</text>

    <text x="540" y="470" font-size="28" font-weight="600" fill="#6B5B47">Deterministic feedback for</text>
    <text x="540" y="508" font-size="28" font-weight="600" fill="#6B5B47">AI-driven development.</text>
  </g>

  <!-- Bottom row: category pills (no emoji to keep render deterministic) -->
  <g class="sans" font-size="20" font-weight="800">
    <g transform="translate(80, 555)">
      <rect width="180" height="46" rx="23" fill="#FBF5EC" stroke="#2A2118" stroke-width="3"/>
      <text x="90" y="30" text-anchor="middle" fill="#2A2118">Security</text>
    </g>
    <g transform="translate(275, 555)">
      <rect width="180" height="46" rx="23" fill="#FBF5EC" stroke="#2A2118" stroke-width="3"/>
      <text x="90" y="30" text-anchor="middle" fill="#2A2118">Hygiene</text>
    </g>
    <g transform="translate(470, 555)">
      <rect width="200" height="46" rx="23" fill="#FBF5EC" stroke="#2A2118" stroke-width="3"/>
      <text x="100" y="30" text-anchor="middle" fill="#2A2118">Reliability</text>
    </g>
    <g transform="translate(685, 555)">
      <rect width="210" height="46" rx="23" fill="#FBF5EC" stroke="#2A2118" stroke-width="3"/>
      <text x="105" y="30" text-anchor="middle" fill="#2A2118">Operational</text>
    </g>
    <g transform="translate(910, 555)">
      <rect width="210" height="46" rx="23" fill="#FBF5EC" stroke="#2A2118" stroke-width="3"/>
      <text x="105" y="30" text-anchor="middle" fill="#2A2118">Deployment</text>
    </g>
  </g>
</svg>
