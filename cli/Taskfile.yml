version: '3'

# Tasks for the slopstopper-cli Python package.
# Internal — this Taskfile is NOT part of the distributed slopstopper
# suite and is not seeded into adopter repos. CI (`.github/workflows/ci-cli.yml`)
# and local development must both call the targets here so versions and
# tooling stay in sync across contexts.
#
# Invoke from anywhere in the repo:
#
#   task -t cli/Taskfile.yml test
#   task -t cli/Taskfile.yml test -- -k docs_size   # filter
#
# or from cli/:
#
#   task test

tasks:
  install:
    desc: Create cli/.venv and install slopstopper-cli with test extras
    cmds:
      - test -d .venv || python3 -m venv .venv
      - .venv/bin/pip install --quiet --upgrade pip
      - .venv/bin/pip install --quiet -e '.[test]'
    sources:
      - pyproject.toml
    generates:
      - .venv/pyvenv.cfg

  test:
    desc: Run the pytest suite
    deps: [install]
    cmds:
      - .venv/bin/pytest tests/ {{.CLI_ARGS}}

  parity:
    desc: Verify CLI reports are byte-identical to the bash scripts they replace
    summary: |
      For each check that has been ported to the CLI, runs both the
      legacy bash/python implementation under .ss/scripts/ and the CLI
      port, then diffs their reports (excluding the timestamp line).
      Any divergence fails CI — this is the load-bearing proof that
      the CLI hasn't drifted from the bash scripts it will eventually
      replace.

      As more checks land, add a new section to the script below.
      When a check is fully cut over (workflow flipped, bash script
      deleted), remove its section.
    deps: [install]
    dir: '{{.TASKFILE_DIR}}/..'
    cmds:
      - |
        set -e
        TMP=$(mktemp -d)
        trap 'rm -rf "$TMP"' EXIT
        # Strip timestamp lines from both .md reports and .json reports so
        # parity isn't broken by clock drift between bash and CLI runs.
        # Patterns observed across checks:
        #   **Generated:** YYYY-MM-DD ...     (docs-size, entry-files, docs-structure, docs-accuracy)
        #   **Generated**: YYYY-MM-DD ...     (complexity — asterisks before colon)
        #   "generated_at": "...",            (every JSON report)
        STRIP='^\*\*Generated|"generated_at"'
        FAILED=0

        # check_parity NAME BASH_CMD CLI_CMD REPORT_PATH [REPORT_PATH...]
        # Each REPORT_PATH names a single file the check owns. Both
        # implementations must write to the same paths; we diff every
        # named file (timestamp-stripped). Explicit paths avoid
        # accidentally diffing co-located reports owned by other checks.
        check_parity() {
          local name="$1"
          local bash_cmd="$2"
          local cli_cmd="$3"
          shift 3
          local report_paths=("$@")

          echo ""
          echo "=== ${name} ==="

          # Bash side. Exit code may legitimately be non-zero (some checks
          # gate CI on violations); the report diff is what we're judging.
          eval "$bash_cmd" > /dev/null 2>&1 || true
          local i=0
          for report_path in "${report_paths[@]}"; do
            cp "$report_path" "$TMP/${name}-bash-${i}" 2>/dev/null || true
            i=$((i + 1))
          done

          # CLI side.
          eval "$cli_cmd" > /dev/null 2>&1 || true
          i=0
          for report_path in "${report_paths[@]}"; do
            cp "$report_path" "$TMP/${name}-cli-${i}" 2>/dev/null || true
            i=$((i + 1))
          done

          local check_failed=0
          i=0
          for report_path in "${report_paths[@]}"; do
            local label="$(basename "$report_path")"
            local bash_file="$TMP/${name}-bash-${i}"
            local cli_file="$TMP/${name}-cli-${i}"
            i=$((i + 1))
            if [ ! -f "$bash_file" ]; then
              echo "  ❌ ${label}: bash did not produce this report"
              check_failed=1
              continue
            fi
            if [ ! -f "$cli_file" ]; then
              echo "  ❌ ${label}: CLI did not produce this report"
              check_failed=1
              continue
            fi
            grep -vE "$STRIP" "$bash_file" > "$TMP/${name}-${i}.bash-stripped" || true
            grep -vE "$STRIP" "$cli_file" > "$TMP/${name}-${i}.cli-stripped" || true
            if diff -u "$TMP/${name}-${i}.bash-stripped" "$TMP/${name}-${i}.cli-stripped"; then
              echo "  ✅ ${label}"
            else
              echo "  ❌ ${label}"
              check_failed=1
            fi
          done

          if [ "$check_failed" -eq 0 ]; then
            echo "✅ ${name} parity OK"
          else
            echo "❌ ${name} parity FAILED"
            FAILED=1
          fi
        }

        check_parity \
          "hygiene-docs-size" \
          "bash .ss/scripts/check-docs-size.sh" \
          "cli/.venv/bin/slopstopper run hygiene:docs-size" \
          ".ss/reports/docs/docs-size-report.md"

        check_parity \
          "hygiene-entry-files" \
          "python3 .ss/scripts/check-entry-file-size.py" \
          "cli/.venv/bin/slopstopper run hygiene:entry-files" \
          ".ss/reports/entry-files/entry-file-size-report.md" \
          ".ss/reports/entry-files/entry-file-size-report.json"

        # docs-structure is a two-script bash flow: check writes JSON,
        # generate reads JSON and writes MD. Chain them so the parity
        # snapshot captures both outputs.
        check_parity \
          "hygiene-docs-structure" \
          "python3 .ss/scripts/check-docs-structure.py; python3 .ss/scripts/generate-docs-structure-md.py" \
          "cli/.venv/bin/slopstopper run hygiene:docs-structure" \
          ".ss/reports/docs/docs-structure-report.json" \
          ".ss/reports/docs/docs-structure-report.md"

        check_parity \
          "hygiene-docs-accuracy" \
          "python3 .ss/scripts/check-docs-accuracy.py; python3 .ss/scripts/generate-docs-accuracy-md.py" \
          "cli/.venv/bin/slopstopper run hygiene:docs-accuracy" \
          ".ss/reports/docs/docs-accuracy-report.json" \
          ".ss/reports/docs/docs-accuracy-report.md"

        # hygiene:complexity shells out to `python -m lizard`. The bash
        # side calls the full task target (which check-installs lizard,
        # runs lizard --csv, then runs generate-complexity-md.py); the CLI
        # side does the same via subprocess. Both produce identical CSV
        # and MD when run against the same tree.
        check_parity \
          "hygiene-complexity" \
          "task ss:hygiene:complexity" \
          "cli/.venv/bin/slopstopper run hygiene:complexity" \
          ".ss/reports/complexity/complexity-report.csv" \
          ".ss/reports/complexity/complexity-report.md"

        # csp-exceptions exercises the headers-adapter pluggability seam.
        # Both .json and .md outputs are byte-identical (no timestamp in
        # either, so no strip needed — but the helper strips the same way
        # regardless).
        check_parity \
          "hygiene-csp-exceptions" \
          "python3 .ss/scripts/check-csp-exceptions.py" \
          "cli/.venv/bin/slopstopper run hygiene:csp-exceptions" \
          ".ss/reports/csp/csp-exceptions-report.json" \
          ".ss/reports/csp/csp-exceptions-report.md"

        # security:secrets shells out to `gitleaks`. The bash side calls
        # the canonical task (which check-installs gitleaks via
        # secrets:check-tool), then the CLI subprocess-invokes the same
        # gitleaks now on PATH. Order matters: bash first installs, then
        # CLI uses what bash installed.
        check_parity \
          "security-secrets" \
          "task ss:security:secrets" \
          "cli/.venv/bin/slopstopper run security:secrets" \
          ".ss/reports/secrets/secrets-report.json" \
          ".ss/reports/secrets/secrets-report.md"

        echo ""
        if [ "$FAILED" -eq 0 ]; then
          echo "All parity checks passed."
        else
          echo "One or more parity checks failed — see diff(s) above."
          exit 1
        fi
